version: "3.7"
services:
  asset-rpo:
    image: zurielbax/asset-rpo:latest
    container_name: asset-rpo
    depends_on:
      asset-rpo-db:
        condition: service_healthy
    ports:
      - ${APP_PORT}:80
    environment: 
      - APP_KEY= ${ASSET_APP_KEY}
      - DB_HOST= asset-rpo-db
      - DB_USERNAME= assetuser
      - DB_PASSWORD= ${ASSET_DB_PASS}
      - DB_CONNECTION=pgsql
      - DB_PORT=5432
      - PHP_TZ=${TZ}
      - TIMEZONE=${TZ}
      - PUID=1000
      - PGID=1000
      - APP_NAME=Asset RPO
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL="${APP_PROTOCOL-http}://${APP_DOMAIN}"
      - ASSET_URL="${APP_PROTOCOL-http}://${APP_DOMAIN}"
      - DB_DATABASE=asset
      - DB_PASSWORD_FILE=rootpass
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - SESSION_ENCRYPT=true
      - SESSION_PATH=/
      - SESSION_DOMAIN="${APP_DOMAIN}"
      - SANCTUM_STATEFUL_DOMAINS="${APP_DOMAIN}"
      - STARTUP_DELAY=5
      - TRUSTED_PROXIES='*'
      - MAIL_MAILER=smtp
      - MAIL_HOST=${ASSET_MAIL_HOST}
      - MAIL_PORT='${ASSET_MAIL_PORT}'
      - MAIL_USERNAME='${ASSET_MAIL_USERNAME}'
      - MAIL_PASSWORD='${ASSET_MAIL_PASSWORD}'
      - MAIL_ENCRYPTION='${ASSET_MAIL_ENCRYPTION:-tls}'
      - MAIL_FROM_ADDRESS='${ASSET_MAIL_FROM_ADDRESS:-noreply@rpo.com}'
      - MAIL_FROM_NAME='${ASSET_MAIL_FROM_NAME:-"Asset RPO"}'
    volumes:
      - ${APP_DATA_DIR}/data/data:/data
      - ${APP_DATA_DIR}/data/conf:/conf
    restart: unless-stopped
    networks:
      - tipi_main_network
    labels:
      # Main
      traefik.enable: true
      traefik.http.middlewares.asset-web-redirect.redirectscheme.scheme: https
      traefik.http.services.asset.loadbalancer.server.port: 80
      # Web
      traefik.http.routers.asset-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.asset-insecure.entrypoints: web
      traefik.http.routers.asset-insecure.service: asset
      traefik.http.routers.asset-insecure.middlewares: asset-web-redirect
      # Websecure
      traefik.http.routers.asset.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.asset.entrypoints: websecure
      traefik.http.routers.asset.service: asset
      traefik.http.routers.asset.tls.certresolver: myresolver
      # Local domain
      traefik.http.routers.asset-local-insecure.rule: Host(`asset.${LOCAL_DOMAIN}`)
      traefik.http.routers.asset-local-insecure.entrypoints: web
      traefik.http.routers.asset-local-insecure.service: asset
      traefik.http.routers.asset-local-insecure.middlewares: asset-web-redirect
      # Local domain secure
      traefik.http.routers.asset-local.rule: Host(`asset.${LOCAL_DOMAIN}`)
      traefik.http.routers.asset-local.entrypoints: websecure
      traefik.http.routers.asset-local.service: asset
      traefik.http.routers.asset-local.tls: true
      runtipi.managed: true
  asset-rpo-db:
    image: postgres:17
    container_name: asset-rpo-db
    hostname: asset-rpo-db
    security_opt:
      - 'no-new-privileges:true'
    environment:
      - TZ=${TZ}
      - MARIADB_RANDOM_ROOT_PASSWORD=true
      - MARIADB_DATABASE=asset
      - MARIADB_USER=userasset
      - MARIADB_PASSWORD=${asset_DB_PASS}
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -q -d asset -U assetuser"
      timeout: 45s
      interval: 10s
      retries: 10
    networks:
      - tipi_main_network
    labels:
      runtipi.managed: true
